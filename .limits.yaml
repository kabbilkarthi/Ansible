---
# AUTHOR: KABBIL GI
# DATE: 28-11-2024

- name: Increase limits 
  hosts: all
  become: yes
  gather_facts: false
  vars:
    ansible_user: 
    user: 

  tasks:
    - name: Existing limits value 
      command: tail -n 5 /etc/security/limits.conf
      register: ans
      tags:
        - existing
        
    
    - name: Existing sysctl value 
      command: cat /etc/sysctl.conf
      register: out
      tags:
        - existing
      

    - name: Debug Existing limits value 
      debug:
        var: ans.stdout_lines
      tags:
        - existing
      
    
    - name: Debug Existing sysctl value
      debug:
        var: out.stdout_lines
      tags:
        - existing
      

    - name: Set max process hard/soft limit
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} nproc"
        block: |
          {{ user }} hard nproc 2097512
          {{ user }} soft nproc 2097512
      tags:
        - add_nproc

    - name: Set max descriptors hard/soft limit
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} nofile"
        block: |
          {{ user }} hard nofile 65536
          {{ user }} soft nofile 65536
      tags:
        - add_nofile

    - name: Set pid_max value
      sysctl:
        name: kernel.pid_max
        value: 2000000
        state: present
        sysctl_set: yes
      tags:
        - add_pid_max

    - name: Set threads-max value
      sysctl:
        name: kernel.threads-max
        value: 2000000
        state: present
        sysctl_set: yes
      tags:
        - add_threads-max

    - name: Remove max process hard/soft limit
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} nproc"
        block: |
          {{ user }} hard nproc 2097512
          {{ user }} soft nproc 2097512
        state: absent
      tags:
        - remove_nproc

    - name: Remove max descriptors hard/soft limit
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} nofile"
        block: |
          {{ user }} hard nofile 65536
          {{ user }} soft nofile 65536
        state: absent
      tags:
        - remove_nofile

    - name: Remove pid_max value
      sysctl:
        name: kernel.pid_max
        value: 2000000
        state: absent
        sysctl_set: yes
      tags:
        - remove_pid_max

    - name: Remove threads-max value
      sysctl:
        name: kernel.threads-max
        value: 2000000
        state: absent
        sysctl_set: yes
      tags:
        - remove_threads-max
    
    - name: updated limits value 
      command: tail -n 5 /etc/security/limits.conf
      register: ans
      tags:
        - updated
    
    - name: updated sysctl value 
      command: cat /etc/sysctl.conf
      register: out
      tags:
        - updated

    - name: Debug updated limits value 
      debug:
        var: ans.stdout_lines
      tags:
        - updated
    
    - name: Debug updated sysctl value
      debug:
        var: out.stdout_lines
      tags:
        - updated
    
    - name: Remove remote_tmp file
      file:
        path: /tmp/{{ansible_user}}
        state: absent
      tags:
        - cleanup